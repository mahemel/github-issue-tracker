<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Dashboard</title>

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-clifford: #da373d;
            --color-black: #1F2937;
            --color-blue: #4A00FF;
            --color-dark-gray: #64748B;
            --color-light-gray: #E4E4E7;
            --color-green: #00A96E;
            --color-red: #EF4444;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen">
    <header>       
        <div class="navbar bg-base-100 shadow-sm px-5 xl:px-[80px]">
            <div class="flex-1 flex items-center gap-[3px]">
                <img src="assets/github-logo.png" alt="Logo" class="w-9">

                <h1 class="text-black text-lg sm:text-2xl leading-none font-semibold hidden sm:block">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2 search-section">
                <input id="search-input" autocapitalize="off" type="text" placeholder="Search issues..." class="input input-bordered w-[140px] md:w-auto" />
                <button id="searchBtn" class="btn btn-primary font-normal" type="button">Search</button>
            </div>
        </div>
    </header>

    <main class=" px-5">
        <div class="container mx-auto space-y-4 py-[16px] xl:py-[60px]">
            <div id="issue-btns" class="issue-btns p-3 sm:p-6 flex flex-wrap justify-center sm:justify-start gap-2 bg-white rounded-lg drop-shadow-[0_1px_6px_rgba(0,0,0,0.08)]">
                <button id="all" class="btn active text-base font-medium text-dark-gray h-10 w-[90px] sm:w-[120px] rounded border-light-gray bg-white">All</button>
                <button id="open" class="btn text-base font-medium text-dark-gray h-10 w-[90px] sm:w-[120px] rounded border-light-gray bg-white">Open</button>
                <button id="closed" class="btn text-base font-medium text-dark-gray h-10 w-[90px] sm:w-[120px] rounded border-light-gray bg-white">Closed</button>
            </div>
            <!-- Issues Btn -->
            
            <div id="spinner" class="flex justify-center hidden"><span class="loading loading-dots loading-xl"></span></div>

            <div class="issues-wrapper bg-white rounded-lg drop-shadow-[0_1px_6px_rgba(0,0,0,0.08)]">

                <div id="issue-count-wrap" class="p-3 sm:p-6 flex flex-wrap justify-between items-center border-b border-light-gray">
                    <div class="flex items-center gap-2">
                        <img src="assets/aperture.svg" alt="">

                        <div class="flex flex-col">
                            <h2 class="font-semibold text-xl text-black"><span id="issue-counter"></span> Issues</h2>
                            <p class="text-sm sm:text-base text-dark-gray">Track and manage your project issues</p>
                        </div>
                    </div>
                    <ul class="flex gap-4 mt-3 sm:mt-0">
                        <li class="flex gap-2 items-center"><div aria-label="status" class="status status-accent"></div> Open</li>
                        <li class="flex gap-2 items-center"><div aria-label="status" class="status status-secondary"></div> Closed</li>
                    </ul>
                    
                </div>

                
                <div id="issueContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 p-3 sm:p-6 bg-[#fafafa] rounded-bl-xl rounded-br-xl">
                    
                </div>
            </div>
        </div>
    </main>
    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

<dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box p-3 sm:p-6 rounded-xl">
        <div id="issue-detail" class="space-y-6">
        </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-primary text-white font-normal">Close</button>
            </form>
        </div>
    </div>
</dialog>

    <script src="scripts/app.js"></script>

</body>
</html>
