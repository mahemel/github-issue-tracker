<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Login</title>

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-clifford: #da373d;
            --color-black: #1F2937;
            --color-blue: #4A00FF;
            --color-dark-gray: #64748B;
            --color-light-gray: #E4E4E7;
            --color-green: #E4E4E7;
            --color-red: #EF4444;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen p-5 sm:px-0 sm:py-[78px]">

    <div class="card bg-white w-full max-w-lg shadow-sm mx-auto">
        <div class="card-body p-5 sm:p-8 gap-4 sm:gap-6">

            <div class="login-header space-y-6">
                <img src="assets/github-logo.png" alt="Github Logo" class="mx-auto">

                <div class="login-header-copy space-y-1">
                    <h2 class="text-2xl font-semibold text-center text-black ">GitHub Issues Tracker</h2>
                    <p class="text-center text-dark-gray">Sign in to manage your issues</p>
                </div>
            </div>

            <fieldset class="fieldset p-0 gap-2">
                <label class="label font-medium text-black text-base">Username</label>
                <div class="space-y-1.5 mb-2">
                    <input type="text" class="input w-full text-base h-12 rounded-lg border-light-gray text-dark-gray" placeholder="Enter Username" />
                    <p class="text-blue text-sm">Default: admin</p>
                </div>

                <label class="label font-medium text-black text-base">Password</label>
                <div class="space-y-1.5">
                    <input type="password" class="input w-full text-base h-12 rounded-lg border-light-gray text-dark-gray" placeholder="Enter Password" />
                    <p class="text-blue text-sm">Default: admin123</p>
                </div>
                
                <button class="btn bg-blue mt-4 text-base h-12 rounded-lg text-white">Sign In</button>
            </fieldset>
            <div class="flex w-full flex-col">
                <div class="divider text-black text-base m-0 gap-2">OR</div>
            </div>

            <div class="demo-credentials space-y-2">
                <p class="text-center text-sm text-dark-gray">Demo Credentials:</p>

                <div class="rounded-lg bg-[#F8FAFC] p-6 text-center">
                    <p class="text-base text-dark-gray"><span class="font-semibold">Username:</span> admin</p>
                    <p class="text-base text-dark-gray"><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </div>
    

</body>
</html>
